<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário/Cadastro</title>
    <link rel="stylesheet" href="cadastro_5.css">
</head>
<body>
    <h2>Cadastro de usuário</h2>
    <form id="cadastroForm">
        <div class="form-group">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome nome="nome>"
            <span id="error-name" class="error">Por favor, insira seu nome completo.</span>
        </div>
        <div class="form-group">
            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade">
            <span id="error-idade" class="error">A idade deve ser um numero entre 1 e 120.</span>
        </div>
        <div class="form-group">
            <label for="email">E-mail</label>
            <input type="text" id="email" name="email">
            <span id="error-email class="error">Insira um e-mail.</span>
        </div>
        <div class="form-group">
            <label for="nacionalidade">Nacionalidade:</label>
            <input type: text id="nacionalidade" name="nacionalidade">
            <span id="error">Informe sua nacionalidade</span>
        </div>
        <div class="form-group">
            <label for="telefone">Telefone:</label>
            <input type="number" id="telefone" name="telefone" placeholder="(00) 00000-000000">
            <span id="error-telefone" class="error">Informe um telefone válido (mínimo 10 dígitos)</span>
        </div>
        


        
</body>
</html>
