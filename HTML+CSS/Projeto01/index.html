<!DOCTYPE html>
<html lang="en">
<head>

    <title>Formulário</title>
    <link rel="stylesheet" href="style.css">
 </head>
 <body>
     <div class="Countainer">
        <h1>Formulário de Cadastro</h1>
     <form>
        <label for="name">Nome:</label>
        <input type="text" id="name" placeholder="Digite seu nome"> <br><br>

       <label for="email">E-mail:</label>
       <input type="email" id="name" placeholder="Digite seu E-mail"> <br><br>

       <label for="idade">Idade:</label>
        <input type="number" id="idade" placeholder="Digite sua idade"> <br><br>

        <label for="Senha">Senha:</label>
        <input type="password" id="SENHA" placeholder="Digite sua senha"> <br><br>

        <button type="submit">Cadastrar</button>
     </form>
     </div>
 </body>
 </html>
